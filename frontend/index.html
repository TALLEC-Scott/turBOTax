<!DOCTYPE html>
<html>
<head>
  <title>Tax assistant</title>

 <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #e5e5e5;
      font-family: Arial, sans-serif;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 600px;
      max-width: 90%;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #333;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #555;
    }

    pre {
      margin-top: 20px;
      text-align: left;
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #f7f7f7;
      padding: 15px;
      border-radius: 8px;
      min-height: 120px;
      overflow-y: auto;
    }
  </style>
</head>

<body>
 <div class="container">
    <h1>Tax assistant</h1>
    <textarea id="prompt" rows="4">Help me with my revenue declaration</textarea>
    <br>
    <button onclick="run()">Send</button>

    <pre id="output"></pre>
  </div>

  <script type="module">
// llama-server.exe -m Ministral-3-3B-Instruct-2512-Q8_0.gguf -c 4096 --cors
// npx serve .
    import OpenAI from "https://cdn.jsdelivr.net/npm/openai@4.47.1/+esm";

    const client = new OpenAI({
      apiKey: "not-needed",
      baseURL: "http://localhost:8080/v1",
      dangerouslyAllowBrowser: true
    });

    async function run() {
      const prompt = document.getElementById("prompt").value;
      const output = document.getElementById("output");
      output.textContent = "";

      const stream = await client.chat.completions.create({
        model: "local-model",
        messages: [{ role: "user", content: prompt }],
        stream: true,
      });

      for await (const chunk of stream) {
        const token = chunk.choices[0]?.delta?.content;
        if (token) {
          output.textContent += token;
        }
      }
    }

    window.run = run;
  </script>
</body>
</html>
